<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fyntwin — Financial Health Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0b0f;
      --surface: #13151c;
      --surface2: #1c1f2b;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7084;
      --green: #00e5a0;
      --green-dim: #00e5a018;
      --amber: #f5a623;
      --amber-dim: #f5a62318;
      --red: #ff4d6d;
      --red-dim: #ff4d6d18;
      --accent: #7c6dfa;
      --accent-dim: #7c6dfa15;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 3rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-block .brand {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .logo-block .brand span { color: var(--accent); }
    .logo-block .tagline {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Query form */
    .query-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .query-panel label {
      display: block;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .input-row input, .input-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.875rem;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus, .input-row select:focus { border-color: var(--accent); }
    .input-row input.prompt { flex: 1; min-width: 220px; }

    .btn-run {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      padding: 0.65rem 1.6rem;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-run:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-run:active { transform: translateY(0); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Status badge */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
    }
    .status-pill.green  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green); }
    .status-pill.amber  { background: var(--amber-dim);  color: var(--amber);  border: 1px solid var(--amber); }
    .status-pill.red    { background: var(--red-dim);    color: var(--red);    border: 1px solid var(--red); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* Report hero */
    .report-hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 0.4s ease;
    }
    .report-hero .month-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .report-hero .overall-label {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    /* Dimension cards */
    .dim-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .dim-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      animation: fadeUp 0.45s ease;
    }
    .dim-card .dim-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .dim-card .dim-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dim-card .dim-summary {
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.55;
      font-family: var(--mono);
      margin-bottom: 1rem;
    }

    /* Category bar chart */
    .bar-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-row { display: flex; flex-direction: column; gap: 3px; }
    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }
    .bar-meta .cat-name { color: var(--text); }
    .bar-track {
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .bar-fill.over { background: var(--red); }
    .bar-fill.ok   { background: var(--green); }

    /* Trend stat row */
    .stat-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .stat-item {
      flex: 1;
      min-width: 100px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
    }
    .stat-item .stat-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .stat-item .stat-val {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
    }
    .stat-val.pos { color: var(--green); }
    .stat-val.neg { color: var(--red); }

    /* Executive summary */
    .exec-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s ease;
    }
    .exec-panel h3 {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }
    .exec-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .exec-bullets li {
      display: flex;
      gap: 0.6rem;
      font-size: 0.85rem;
      line-height: 1.5;
      font-family: var(--mono);
    }
    .exec-bullets li::before {
      content: '▸';
      color: var(--accent);
      flex-shrink: 0;
    }

    /* Remediation */
    .remed-panel {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.55s ease;
    }
    .remed-panel h3 {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.85rem;
    }
    .remed-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .remed-list li {
      display: flex;
      gap: 0.6rem;
      font-size: 0.85rem;
      line-height: 1.5;
      font-family: var(--mono);
    }
    .remed-list li::before { content: '→'; color: var(--red); flex-shrink: 0; }

    /* Agents involved */
    .agents-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .agent-chip {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      letter-spacing: 0.06em;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s ease;
    }
    .table-wrap h3 {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    td {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .overspent-row td { color: var(--red); }
    .good-row td { color: var(--text); }

    /* Loader */
    .loader {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Error */
    .error-box {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--red);
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-block">
      <div class="brand">Fyn<span>twin</span></div>
      <div class="tagline">Financial Health Monitor · AI-Powered</div>
    </div>
  </header>

  <!-- Query Panel -->
  <div class="query-panel">
    <label>Ask your financial assistant</label>
    <div class="input-row">
      <input class="prompt" id="promptInput" type="text"
        placeholder="Give me a financial health report for April 2026"
        value="Give me a financial health report for this month" />
      <select id="monthSelect">
        <option value="1">Jan</option>
        <option value="2">Feb</option>
        <option value="3">Mar</option>
        <option value="4" selected>Apr</option>
        <option value="5">May</option>
        <option value="6">Jun</option>
        <option value="7">Jul</option>
        <option value="8">Aug</option>
        <option value="9">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12">Dec</option>
      </select>
      <input id="yearInput" type="number" value="2026" min="2020" max="2100" style="width:90px" />
      <button class="btn-run" id="runBtn" onclick="runAnalysis()">Analyse →</button>
    </div>
  </div>

  <!-- Output area -->
  <div id="output"></div>
</div>

<script>
  const API = 'http://localhost:8000/api/v1';

  function statusClass(s) {
    if (!s) return '';
    return s.toLowerCase();
  }

  function formatINR(n) {
    return '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }

  function formatPct(n) {
    const sign = n > 0 ? '+' : '';
    return sign + Number(n).toFixed(1) + '%';
  }

  async function runAnalysis() {
    const btn   = document.getElementById('runBtn');
    const out   = document.getElementById('output');
    const prompt = document.getElementById('promptInput').value.trim();
    const month  = parseInt(document.getElementById('monthSelect').value);
    const year   = parseInt(document.getElementById('yearInput').value);

    if (!prompt) return;
    btn.disabled = true;
    out.innerHTML = `<div class="loader"><div class="spinner"></div>Agents running in parallel — budget, trend & concentration...</div>`;

    try {
      const res = await fetch(`${API}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, year, month }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }
      const data = await res.json();
      renderReport(data.report);
    } catch(e) {
      out.innerHTML = `<div class="error-box">⚠ ${e.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderReport(r) {
    const sc = statusClass(r.overall_status);
    let html = '';

    // Hero
    html += `
      <div class="report-hero">
        <div>
          <div class="month-label">Report Period</div>
          <div class="overall-label">${r.month}</div>
        </div>
        <div>
          <div class="month-label">Overall Status</div>
          <div style="margin-top:4px">
            <span class="status-pill ${sc}"><span class="dot"></span>${r.overall_status}</span>
          </div>
        </div>
      </div>`;

    // Agents involved
    html += `<div class="agents-row">`;
    r.agents_involved.forEach(a => { html += `<span class="agent-chip">${a}</span>`; });
    html += `</div>`;

    // Dimension cards
    html += `<div class="dim-grid">`;

    // Budget card
    const b = r.budget;
    html += `
      <div class="dim-card">
        <div class="dim-header">
          <span class="dim-title">Budget Health</span>
          <span class="status-pill ${statusClass(b.status)}"><span class="dot"></span>${b.status}</span>
        </div>
        <div class="dim-summary">${b.summary}</div>
        <div class="bar-list">`;
    const maxSpend = Math.max(...(b.all_category_data || []).map(c => c.spend || 0), 1);
    (b.all_category_data || []).forEach(c => {
      const isOver = c.over_by > 0;
      const fillCls = isOver ? 'over' : 'ok';
      const pct = Math.min(100, (c.spend / (c.budget || maxSpend)) * 100);
      html += `
        <div class="bar-row">
          <div class="bar-meta">
            <span class="cat-name">${c.category}</span>
            <span>${formatINR(c.spend)} / ${formatINR(c.budget || 0)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${fillCls}" style="width:${pct}%"></div></div>
        </div>`;
    });
    html += `</div></div>`;

    // Trend card
    const t = r.trend;
    const cfCls = t.net_cash_flow >= 0 ? 'pos' : 'neg';
    const chgCls = t.change_pct <= 0 ? 'pos' : 'neg';
    html += `
      <div class="dim-card">
        <div class="dim-header">
          <span class="dim-title">Spending Trend</span>
          <span class="status-pill ${statusClass(t.status)}"><span class="dot"></span>${t.status}</span>
        </div>
        <div class="dim-summary">${t.summary}</div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-label">This Month</div>
            <div class="stat-val">${formatINR(t.current_spend)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Last Month</div>
            <div class="stat-val">${formatINR(t.previous_spend)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Change</div>
            <div class="stat-val ${chgCls}">${formatPct(t.change_pct)}</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-label">Income</div>
            <div class="stat-val pos">${formatINR(t.current_income)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Net Cash Flow</div>
            <div class="stat-val ${cfCls}">${formatINR(t.net_cash_flow)}</div>
          </div>
        </div>
      </div>`;

    // Concentration card
    const c = r.concentration;
    html += `
      <div class="dim-card">
        <div class="dim-header">
          <span class="dim-title">Concentration</span>
          <span class="status-pill ${statusClass(c.status)}"><span class="dot"></span>${c.status}</span>
        </div>
        <div class="dim-summary">${c.summary}</div>
        <div class="stat-row">
          <div class="stat-item">
            <div class="stat-label">Top Category</div>
            <div class="stat-val">${c.top_category}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">% of Spend</div>
            <div class="stat-val ${c.top_category_pct > 40 ? 'neg' : ''}">${c.top_category_pct.toFixed(1)}%</div>
          </div>
        </div>`;
    if (c.largest_transaction) {
      const lt = c.largest_transaction;
      html += `
        <div style="margin-top:0.75rem; background:var(--surface2); border-radius:8px; padding:0.65rem 0.85rem;">
          <div class="stat-label" style="font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Largest Transaction</div>
          <div style="font-family:var(--mono);font-size:0.78rem;">${lt.merchant} · ${formatINR(Math.abs(lt.amount))}</div>
          <div style="font-family:var(--mono);font-size:0.68rem;color:var(--muted)">${lt.date} · ${lt.category}</div>
        </div>`;
    }
    html += `</div>`;

    html += `</div>`; // end dim-grid

    // Executive summary
    html += `
      <div class="exec-panel">
        <h3>Executive Summary</h3>
        <ul class="exec-bullets">`;
    r.executive_summary.forEach(b => { html += `<li>${b}</li>`; });
    html += `</ul></div>`;

    // Remediation (RED only)
    if (r.remediation && r.remediation.length) {
      html += `
        <div class="remed-panel">
          <h3>⚠ Remediation Suggestions</h3>
          <ul class="remed-list">`;
      r.remediation.forEach(s => { html += `<li>${s}</li>`; });
      html += `</ul></div>`;
    }

    // Spend-by-category table
    html += `
      <div class="table-wrap">
        <h3>Spend by Category — Detailed View</h3>
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Actual Spend</th>
              <th>Monthly Budget</th>
              <th>Over By</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>`;
    (r.budget.all_category_data || []).forEach(row => {
      const over = row.over_by > 0;
      const cls = over ? 'overspent-row' : 'good-row';
      html += `
        <tr class="${cls}">
          <td>${row.category}</td>
          <td>${formatINR(row.spend)}</td>
          <td>${formatINR(row.budget || 0)}</td>
          <td>${over ? formatINR(row.over_by) : '—'}</td>
          <td><span class="status-pill ${over ? 'red' : 'green'}" style="font-size:0.6rem;padding:.15rem .5rem">${over ? 'Over' : 'OK'}</span></td>
        </tr>`;
    });
    html += `</tbody></table></div>`;

    document.getElementById('output').innerHTML = html;
  }
</script>
</body>
</html>
